services:
  mgp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - examples/deploy/reference-gateway/.env.example
    command: ["mgp-gateway", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - ./.data/reference-gateway:/var/lib/mgp
