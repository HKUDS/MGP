name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit reference dependencies
        run: python -m pip_audit -r reference/requirements.lock.txt

      - name: Audit compliance dependencies
        run: python -m pip_audit -r compliance/requirements.lock.txt

      - name: Audit docs dependencies
        run: python -m pip_audit -r docs/requirements.lock.txt
